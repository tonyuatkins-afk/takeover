# TAKEOVER - DOSBox-X configuration
# Usage: dosbox-x -conf tools\dosbox.conf
#
# This config mounts the project root as C: and drops to C:\>.
# Run TAKEOVER.EXE from the DOS prompt, or pass -c "TAKEOVER.EXE"
# on the host command line.

[sdl]
output = surface
windowresolution = 720x400

[render]
aspect = true

[cpu]
cycles = 3000

[speaker]
pcspeaker = true

[dosbox]
machine = svga_s3

[autoexec]
MOUNT C .
C:
